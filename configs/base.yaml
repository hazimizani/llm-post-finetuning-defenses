# Shared defaults for all experiments

model:
  name: "meta-llama/Llama-2-7b-chat-hf"
  torch_dtype: "float16"
  max_seq_length: 512

quantization:
  load_in_4bit: true
  bnb_4bit_compute_dtype: "float16"
  bnb_4bit_quant_type: "nf4"
  bnb_4bit_use_double_quant: true

lora:
  r: 8
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules: ["q_proj", "v_proj"]
  task_type: "CAUSAL_LM"

training:
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 4
  warmup_steps: 100
  num_train_epochs: 3
  learning_rate: 2.0e-5
  fp16: true
  logging_steps: 50
  save_strategy: "epoch"
  seed: 42

data:
  alpaca_dataset: "tatsu-lab/alpaca"
  advbench_url: "https://raw.githubusercontent.com/llm-attacks/llm-attacks/main/data/advbench/harmful_behaviors.csv"
  beavertails_dataset: "PKU-Alignment/BeaverTails"
  sst2_dataset: "glue"
  sst2_subset: "sst2"

defense:
  method: "antidote"
  dense_ratio: 0.1
  prune_method: "wanda"
  nsamples: 128

eval:
  safety_judge: "meta-llama/LlamaGuard-7b"
  max_new_tokens: 256
  temperature: 0.0
  batch_size: 8

paths:
  output_dir: "checkpoints"
  results_dir: "results"
  data_dir: "data"
